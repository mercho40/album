name: CI/CD

# Pipeline de calidad (TP3): lint → test → build → e2e y, solo si TODO pasa en
# un push a main, deploy de front (Vercel) y back (haloy).
#
# Secrets requeridos (Settings → Secrets and variables → Actions):
#   E2E:        NEON_API_KEY, NEON_PROJECT_ID, BETTER_AUTH_SECRET
#   deploy-web: VERCEL_TOKEN, VERCEL_ORG_ID, VERCEL_PROJECT_ID
#   deploy-api: HALOY_API_TOKEN, DATABASE_URL, BETTER_AUTH_SECRET, BETTER_AUTH_URL,
#               WEB_URL, GOOGLE_CLIENT_ID, GOOGLE_CLIENT_SECRET

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  BUN_VERSION: "1.3.14"

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run test
      - run: bun run check-types
        env:
          # svelte-kit sync necesita los $env/static públicos definidos para
          # generar sus tipos; si no, svelte-check falla con "has no exported
          # member 'PUBLIC_API_URL'". Placeholders — el type-check no usa los valores.
          PUBLIC_API_URL: https://api.album.mersich.net
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-to-sign

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run build
        env:
          # Placeholders solo para que el build del front resuelva los $env.
          # El deploy real usa los envs configurados en Vercel.
          PUBLIC_API_URL: https://api.album.mersich.net
          BETTER_AUTH_SECRET: ci-build-placeholder-not-used-to-sign

  e2e:
    runs-on: ubuntu-latest
    # Corre solo si lint y test pasaron: no tiene sentido crear el branch de Neon
    # ni levantar la app si ya sabemos que algo básico falla.
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile

      - name: Crear branch efímero de Neon
        id: neon
        uses: neondatabase/create-branch-action@v5
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch_name: ci-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

      - name: Seed del catálogo
        working-directory: apps/back
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
        # El branch de Neon es una copia del branch default (producción), así que
        # el schema ya existe. No corremos `drizzle-kit migrate` porque intentaría
        # recrear objetos existentes y falla. El seed es idempotente y garantiza el
        # catálogo para el paso de marcado del E2E (usa el cliente Bun SQL del app).
        run: bun run db:seed

      - name: Instalar navegador de Playwright
        working-directory: apps/web
        run: bunx playwright install --with-deps chromium

      - name: Correr E2E
        working-directory: apps/web
        env:
          DATABASE_URL: ${{ steps.neon.outputs.db_url }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          BETTER_AUTH_URL: http://localhost:3000
          WEB_URL: http://localhost:4173
          PUBLIC_API_URL: http://localhost:3000
        run: bun run test:e2e

      - name: Borrar branch de Neon
        if: always()
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ secrets.NEON_PROJECT_ID }}
          branch: ci-${{ github.run_id }}
          api_key: ${{ secrets.NEON_API_KEY }}

  # ── Deploy: solo en push a main y solo si TODO lo anterior pasó ──────────
  deploy-web:
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      # Build server-side en Vercel: usa el Root Directory (apps/web) y el preset
      # SvelteKit del proyecto. Se corre desde la raíz del repo para que el
      # buildCommand del monorepo (cd ../.. && bun install) resuelva las deps.
      # (vercel build local hacía un `vite build` sin el contexto de SvelteKit.)
      - name: Deploy a Vercel (producción)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          bunx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          bunx vercel deploy --prod --token="$VERCEL_TOKEN"

  deploy-api:
    runs-on: ubuntu-latest
    needs: [lint, test, build, e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    concurrency:
      group: deploy-api
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile

      # La imagen de runtime (debian slim + binario) no trae drizzle-kit, así que
      # migramos prod desde el runner antes de deployar. No bloqueante: si el journal
      # de prod no matchea (schema creado fuera de migrate), avisamos y seguimos.
      - name: Migrar DB de producción (no bloqueante)
        working-directory: apps/back
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: bunx drizzle-kit migrate || echo "::warning::drizzle migrate no aplicable; revisar manualmente"

      # haloy no tiene una action oficial publicada, así que instalamos el CLI y
      # deployamos. haloy buildea el Dockerfile (stage `back`) en el runner y sube
      # la imagen al haloyd. Los secrets `from.env` se resuelven del entorno del step.
      - name: Instalar haloy CLI
        # haloy publica solo pre-releases, así que releases/latest da 404. Tomamos
        # el tag más reciente vía API (con token para evitar rate limit) y bajamos
        # el binario de ese tag.
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p "$HOME/.local/bin"
          TAG=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
            https://api.github.com/repos/haloydev/haloy/releases | jq -r '.[0].tag_name')
          echo "haloy CLI tag: $TAG"
          curl -fsSL -o "$HOME/.local/bin/haloy" \
            "https://github.com/haloydev/haloy/releases/download/$TAG/haloy-linux-amd64"
          chmod +x "$HOME/.local/bin/haloy"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Verificar haloy
        run: haloy version
      - name: Registrar server haloyd
        run: haloy server add haloy.restoman.app "$HALOY_TOKEN" --force
        env:
          HALOY_TOKEN: ${{ secrets.HALOY_API_TOKEN }}
      - name: Deploy con haloy
        run: haloy deploy
        env:
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BETTER_AUTH_URL: ${{ secrets.BETTER_AUTH_URL }}
          WEB_URL: ${{ secrets.WEB_URL }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
